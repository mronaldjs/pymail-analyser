name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend:
    name: Backend tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pymail-api/requirements.txt ]; then pip install -r pymail-api/requirements.txt; fi
      - name: Run backend tests
        run: |
          cd pymail-api
          pytest -q

  frontend:
    name: Frontend tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies
        run: |
          cd pymail-webapp
          npm ci
      - name: Run frontend tests
        run: |
          cd pymail-webapp
          npm run test:run
