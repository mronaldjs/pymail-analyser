name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend:
    name: Backend tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: pymail-api/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pymail-api/requirements.txt ]; then pip install -r pymail-api/requirements.txt; fi
          pip install ruff==0.14.6
      - name: Lint (ruff)
        run: |
          cd pymail-api
          ruff check .
      - name: Run backend tests
        run: |
          cd pymail-api
          pytest -q
      - name: Check OpenAPI schema is up to date
        run: |
          make openapi
          git diff --exit-code pymail-webapp/openapi.json \
            || (echo "::error::openapi.json is stale — run 'make openapi' and commit the result." && exit 1)

  frontend:
    name: Frontend tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pymail-webapp/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd pymail-webapp
          npm ci
      - name: Lint
        run: |
          cd pymail-webapp
          npm run lint
      - name: Typecheck
        run: |
          cd pymail-webapp
          npx tsc --noEmit
      - name: Check generated API types are up to date
        run: |
          cd pymail-webapp
          npm run gen:types
          git diff --exit-code types/api.generated.ts \
            || (echo "::error::api.generated.ts is stale — run 'npm run gen:types' and commit the result." && exit 1)
      - name: Run frontend tests
        run: |
          cd pymail-webapp
          npm run test:run

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pymail-webapp/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd pymail-webapp
          npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pymail-webapp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install Playwright browser
        run: |
          cd pymail-webapp
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: |
          cd pymail-webapp
          npm run test:e2e
